<style>
:root {
  --vert: #1D9E75; --vert-f: #0F6E56; --vert-cl: #E1F5EE; --vert-tx: #085041;
  --orange: #EF9F27; --orange-cl: #FAEEDA; --orange-tx: #854F0B;
  --rouge: #E24B4A; --rouge-cl: #FCEBEB; --rouge-tx: #A32D2D;
  --bleu-cl: #E6F1FB; --bleu-tx: #185FA5;
  --fond: #ffffff; --fond2: #F5F5F3; --bord: #E0E0DC;
  --texte: #1A1A1A; --texte2: #777;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--fond2); color: var(--texte); }
#app { max-width: 820px; margin: 0 auto; background: var(--fond); min-height: 100vh; }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--bord); background: var(--fond);
  position: sticky; top: 0; z-index: 10; }
.logo { font-size: 22px; font-weight: 800; color: var(--vert); letter-spacing: -1px; }
.logo span { font-size: 13px; color: var(--texte2); font-weight: 400; margin-left: 6px; }

/* BOUTONS */
.btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px;
  cursor: pointer; font-weight: 600; display: inline-flex; align-items: center;
  gap: 6px; font-family: inherit; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-vert { background: var(--vert); color: #fff; }
.btn-gris { background: var(--fond2); border: 1px solid var(--bord); color: var(--texte2); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-ok { background: var(--vert-cl); color: var(--vert-tx); border: none; }
.btn-non { background: var(--rouge-cl); color: var(--rouge-tx); border: none; }

/* CONTENEUR */
.page { padding: 20px; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat { background: var(--fond2); border-radius: 10px; padding: 12px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 800; color: var(--vert); }
.stat-lbl { font-size: 11px; color: var(--texte2); margin-top: 2px; }

/* BANNIERES */
.banniere { padding: 12px 18px; display: flex; align-items: center;
  justify-content: space-between; gap: 12px; }
.ban-essai { background: var(--orange-cl); border-left: 4px solid var(--orange); }
.ban-urgent { background: var(--rouge-cl); border-left: 4px solid var(--rouge); }
.ban-actif { background: var(--vert-cl); border-left: 4px solid var(--vert); }
.ban-titre { font-size: 13px; font-weight: 700; }
.ban-sub { font-size: 12px; margin-top: 2px; }

/* BADGES */
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge-confirme { background: var(--vert-cl); color: var(--vert-tx); }
.badge-attente  { background: var(--orange-cl); color: var(--orange-tx); }
.badge-fait     { background: var(--fond2); color: var(--texte2); border: 1px solid var(--bord); }
.badge-annule   { background: var(--rouge-cl); color: var(--rouge-tx); }
.badge-admin    { background: var(--bleu-cl); color: var(--bleu-tx); }

/* SECTEURS — icônes colorées */
.icone-secteur { width: 36px; height: 36px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.s-medical    { background: #E8F5E9; }
.s-bancaire   { background: #E3F2FD; }
.s-admin      { background: #FFF3E0; }
.s-juridique  { background: #F3E5F5; }
.s-commercial { background: #E0F7FA; }
.s-education  { background: #FFF8E1; }
.s-autre      { background: var(--fond2); }

/* LIGNES RDV */
.rdv-ligne { display: flex; align-items: center; gap: 10px;
  padding: 11px 0; border-bottom: 1px solid var(--bord); }
.rdv-heure { font-size: 13px; font-weight: 700; color: var(--vert); min-width: 44px; }
.point { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.p-confirme { background: var(--vert); }
.p-attente  { background: var(--orange); }
.p-fait     { background: #bbb; }
.p-annule   { background: var(--rouge); }
.rdv-corps { flex: 1; }
.rdv-nom  { font-size: 14px; font-weight: 600; }
.rdv-info { font-size: 11px; color: var(--texte2); margin-top: 2px; }
.rdv-actions { display: flex; gap: 5px; }

/* ONGLETS */
.onglets { display: flex; border-bottom: 1px solid var(--bord); margin-bottom: 14px;
  overflow-x: auto; }
.onglet { padding: 10px 14px; font-size: 13px; border: none; background: transparent;
  cursor: pointer; color: var(--texte2); border-bottom: 2px solid transparent;
  white-space: nowrap; font-family: inherit; font-weight: 500; }
.onglet.actif { color: var(--vert); border-bottom-color: var(--vert); font-weight: 700; }

/* EN-TETE SECTION */
.section-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-titre { font-size: 15px; font-weight: 700; }

/* LOGIN */
.login-page { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
.login-logo { font-size: 56px; font-weight: 900; color: var(--vert); letter-spacing: -2px; }
.login-ar   { font-size: 28px; color: var(--texte2); direction: rtl; margin-top: 4px; }
.login-sub  { font-size: 14px; color: var(--texte2); margin: 10px 0 30px; text-align: center; line-height: 1.6; }
.login-sec  { font-size: 11px; font-weight: 700; color: var(--texte2); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 10px; width: 100%; max-width: 460px; }
.login-carte { background: var(--fond); border: 1px solid var(--bord); border-radius: 12px;
  padding: 14px 16px; margin-bottom: 8px; width: 100%; max-width: 460px;
  display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .1s; }
.login-carte:hover { background: var(--fond2); }
.avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.av-vert   { background: var(--vert-cl); color: var(--vert-tx); }
.av-orange { background: var(--orange-cl); color: var(--orange-tx); }
.av-rouge  { background: var(--rouge-cl); color: var(--rouge-tx); }
.av-bleu   { background: var(--bleu-cl); color: var(--bleu-tx); }

/* ZONE ADMIN LOGIN — intégrée dans la page, pas de prompt */
.admin-zone { width: 100%; max-width: 460px; background: var(--fond2);
  border-radius: 12px; padding: 16px; margin-top: 4px; }
.champ { width: 100%; padding: 10px 12px; border: 1px solid var(--bord);
  border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--fond);
  color: var(--texte); margin-bottom: 10px; }
.champ:focus { outline: 2px solid var(--vert); border-color: transparent; }
.erreur { font-size: 12px; color: var(--rouge); text-align: center; margin-top: 6px; display: none; }

/* PAYWALL */
.paywall-page { max-width: 500px; margin: 0 auto; padding: 36px 20px; text-align: center; }
.paiement-carte { display: flex; align-items: center; gap: 14px; padding: 13px 16px;
  margin-bottom: 9px; border: 1px solid var(--bord); border-radius: 12px;
  cursor: pointer; transition: all .15s; text-align: left; }
.paiement-carte:hover { border-color: var(--vert); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
.paiement-logo { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; overflow: hidden; }
.paiement-nom  { font-size: 14px; font-weight: 700; }
.paiement-num  { font-size: 12px; color: var(--texte2); margin-top: 3px; }
.paiement-ussd { font-size: 11px; color: var(--texte2); margin-top: 2px; }

/* TABLEAU ADMIN */
.tableau { width: 100%; border-collapse: collapse; font-size: 13px; }
.tableau th { text-align: left; padding: 9px 12px; font-size: 11px; color: var(--texte2);
  border-bottom: 1px solid var(--bord); background: var(--fond2); font-weight: 700; }
.tableau td { padding: 10px 12px; border-bottom: 1px solid var(--bord); vertical-align: middle; }
.tableau tr:hover td { background: var(--fond2); }

/* MODAL */
.modal-fond { position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal-boite { background: var(--fond); border-radius: 14px; padding: 24px;
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.modal-titre { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
.champ-grp { margin-bottom: 13px; }
.champ-lbl { font-size: 12px; color: var(--texte2); margin-bottom: 5px; display: block; font-weight: 600; }
.champ-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.vide { text-align: center; padding: 30px; color: var(--texte2); font-size: 14px; }
.infobox { background: var(--fond2); border-radius: 10px; padding: 14px 16px;
  font-size: 12px; color: var(--texte2); line-height: 1.8; margin-top: 16px; }

@media (max-width: 560px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .champ-2 { grid-template-columns: 1fr; }
  .tableau th:nth-child(2), .tableau td:nth-child(2) { display: none; }
}
</style>

// ── LOGIQUE ESSAI & ABONNEMENT ───────────────────────────────────
function verifier_acces(client) {
  const maintenant = new Date();

  // Abonnement actif et non expiré
  if (client.abonnement === 'actif' && client.expiration) {
    const fin = new Date(client.expiration + 'T23:59:59');
    if (fin > maintenant) {
      return { type: 'actif', jours_restants: Math.ceil((fin - maintenant) / 86400000) };
    }
  }

  // Période d'essai encore valide
  const fin_essai = new Date(client.essai_debut + 'T00:00:00');
  fin_essai.setDate(fin_essai.getDate() + client.essai_jours);
  if (maintenant < fin_essai) {
    const jours = Math.ceil((fin_essai - maintenant) / 86400000);
    return { type: 'essai', jours_restants: jours, urgent: jours <= 3 };
  }

  // Bloqué
  return { type: 'bloque', jours_depasses: Math.ceil((maintenant - fin_essai) / 86400000) };
}

  if (!client) { deconnexion(); return; }
  const acces = verifier_acces(client);
  if (acces.type === 'bloque') { app.innerHTML = page_paywall(client, acces); return; }
  app.innerHTML = page_client(client, acces);
}

function admin_activer(id, jours) {
  const c = BDD.clients.find(x => x.id === id);
  c.abonnement = 'actif';
  c.expiration = jours_apres(jours);
  afficher();
}
function admin_suspendre(id) {
  if (!confirm('Suspendre l\'accès de ce client ?')) return;
  const c = BDD.clients.find(x => x.id === id);
  c.abonnement = 'expire';
  c.expiration = null;
  afficher();
}
function admin_prolonger(id) {
  BDD.clients.find(x => x.id === id).essai_jours += 7;
  afficher();
}

// ── ACTIONS RDV ───────────────────────────────────────────────────
function changer_statut(cid, rid) {
  const r = BDD.clients.find(x => x.id === cid).rdvs.find(x => x.id === rid);
  const cycle = { confirme: 'attente', attente: 'fait', fait: 'annule', annule: 'confirme' };
  r.statut = cycle[r.statut];
  afficher();
}
function supprimer_rdv(cid, rid) {
  if (!confirm('Supprimer ce rendez-vous ?')) return;
  const c = BDD.clients.find(x => x.id === cid);
  c.rdvs = c.rdvs.filter(x => x.id !== rid);
  afficher();
}
function modifier_rdv(cid, rid) {
  ouvrir_modal_rdv(cid, rid);
}

// ── MODAL NOUVEAU / MODIFIER RDV ─────────────────────────────────
function ouvrir_modal_rdv(cid, rid) {
  const client = BDD.clients.find(x => x.id === cid);
  const rdv = rid != null ? client.rdvs.find(x => x.id === rid) : null;
  const s = SECTEURS[client.secteur];
  const motifs = MOTIFS[client.secteur] || MOTIFS.autre;

  document.getElementById('modal').innerHTML = `
  <div class="modal-fond" onclick="if(event.target===this) fermer_modal()">
    <div class="modal-boite">
      <div class="modal-titre">
        <i class="ti ${s.icone}" style="color:${s.couleur}"></i>
        ${rdv ? 'Modifier le' : 'Nouveau'} rendez-vous
        <span style="font-size:12px;font-weight:400;color:var(--texte2);margin-left:6px">${sec(client.nom)}</span>
      </div>

      <div class="champ-2">
        <div class="champ-grp">
          <label class="champ-lbl">Nom du patient / client *</label>
          <input class="champ" id="f-nom" value="${rdv ? sec(rdv.patient) : ''}" placeholder="Ex: Fatima Mint Sidi">
        </div>
        <div class="champ-grp">
          <label class="champ-lbl">Téléphone</label>
          <input class="champ" id="f-tel" value="${rdv ? sec(rdv.tel) : ''}" placeholder="+222 XX XX XX XX">
        </div>
      </div>

      <div class="champ-2">
        <div class="champ-grp">
          <label class="champ-lbl">Date *</label>
          <input type="date" class="champ" id="f-date" value="${rdv ? rdv.date : auj()}">
        </div>
        <div class="champ-grp">
          <label class="champ-lbl">Heure *</label>
          <input type="time" class="champ" id="f-heure" value="${rdv ? rdv.heure : '09:00'}">
        </div>
      </div>

      <div class="champ-grp">
        <label class="champ-lbl">Motif</label>
        <select class="champ" id="f-motif">
          ${motifs.map(m => `<option value="${sec(m)}" ${rdv && rdv.motif === m ? 'selected' : ''}>${sec(m)}</option>`).join('')}
          <option value="autre" ${rdv && !motifs.includes(rdv.motif) ? 'selected' : ''}>Autre (préciser dans notes)</option>
        </select>
      </div>

      <div class="champ-grp">
        <label class="champ-lbl">Statut</label>
        <select class="champ" id="f-statut">
          <option value="attente"  ${rdv && rdv.statut === 'attente'  ? 'selected' : ''}>En attente</option>
          <option value="confirme" ${!rdv || rdv.statut === 'confirme' ? 'selected' : ''}>Confirmé</option>
          <option value="fait"     ${rdv && rdv.statut === 'fait'     ? 'selected' : ''}>Effectué</option>
          <option value="annule"   ${rdv && rdv.statut === 'annule'   ? 'selected' : ''}>Annulé</option>
        </select>
      </div>

      <div class="champ-grp">
        <label class="champ-lbl">Notes / Observations</label>
        <textarea class="champ" id="f-notes" rows="2"
          placeholder="Informations complémentaires...">${rdv ? sec(rdv.notes) : ''}</textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-gris" onclick="fermer_modal()">Annuler</button>
        <button class="btn btn-vert" onclick="sauvegarder_rdv('${cid}', ${rid ?? 'null'})">
          <i class="ti ti-check"></i> ${rdv ? 'Enregistrer' : 'Ajouter le RDV'}
        </button>
      </div>
    </div>
  </div>`;

  setTimeout(() => document.getElementById('f-nom')?.focus(), 80);
}

function sauvegarder_rdv(cid, rid) {
  const nom   = document.getElementById('f-nom').value.trim();
  const date  = document.getElementById('f-date').value;
  const heure = document.getElementById('f-heure').value;
  if (!nom || !date || !heure) {
    alert('Veuillez remplir les champs obligatoires (*).');
    return;
  }
  const client = BDD.clients.find(x => x.id === cid);
  const donnees = {
    patient: nom,
    tel:     document.getElementById('f-tel').value.trim(),
    date, heure,
    motif:   document.getElementById('f-motif').value,
    statut:  document.getElementById('f-statut').value,
    notes:   document.getElementById('f-notes').value.trim(),
  };
  if (rid != null) {
    Object.assign(client.rdvs.find(x => x.id === rid), donnees);
  } else {
    client.rdvs.push({ id: nouveau_id++, ...donnees });
  }
  fermer_modal();
  afficher();
}

// ── MODAL PAIEMENT ────────────────────────────────────────────────

function modal_abonnement(cid) {
  const client = BDD.clients.find(x => x.id === cid);
  document.getElementById('modal').innerHTML = `
  <div class="modal-fond" onclick="if(event.target===this) fermer_modal()">
    <div class="modal-boite">
      <div class="modal-titre"><i class="ti ti-credit-card"></i> S'abonner à Mawid</div>
      <div style="background:var(--vert-cl);border-radius:10px;padding:14px 16px;margin-bottom:18px">
        <div style="font-size:15px;font-weight:800;color:var(--vert-tx)">Plan Pro — 3 000 MRU / mois</div>
        <div style="font-size:12px;color:var(--vert-f);margin-top:6px;line-height:1.7">
          ✓ RDV illimités &nbsp;·&nbsp; ✓ WhatsApp automatique &nbsp;·&nbsp; ✓ 5 utilisateurs &nbsp;·&nbsp; ✓ Support prioritaire
        </div>
      </div>
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">Choisissez votre app de paiement :</div>
      ${PAIEMENTS.map(p => `
        <div class="paiement-carte" onclick="fermer_modal();voir_detail_paiement('${p.id}','${client.id}')">
          <div class="paiement-logo">${LOGOS[p.logo]}</div>
          <div style="flex:1">
            <div class="paiement-nom">${p.nom}</div>
            <div class="paiement-num">${p.num}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:var(--texte2)"></i>
        </div>`).join('')}
      <button class="btn btn-gris" style="width:100%;margin-top:12px" onclick="fermer_modal()">Annuler</button>

function fermer_modal() {
  document.getElementById('modal').innerHTML = '';
}

// ── DÉMARRAGE ─────────────────────────────────────────────────────
afficher();
</script>
</body>
